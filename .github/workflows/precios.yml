name: Vigila precios

on:
  schedule:
    - cron: "0 */3 * * *"   # cada 3 horas (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: vigila-precios
  cancel-in-progress: false

jobs:
  check:
    # 22.04: Playwright 1.44 (fijado por el Python 3.9 local) no instala sus deps
    # en Ubuntu 24.04 (paquete libasound2 renombrado).
    runs-on: ubuntu-22.04
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cachear pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Ejecutar bot (una pasada)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py --once

      - name: Guardar estado (state.json)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "Sin cambios en el estado."
          else
            git commit -m "Actualiza precios [skip ci]"
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
            git push
          fi
